<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ポヨンと動く考えごと吹き出し</title>
  
<style>

   /* 吹き出し 全体 */
   .talking {
     display: flex; /* フレックスコンテナに変更 */
     align-items: flex-start; /* 垂直方向にアイテムを揃える */
     position: relative;

      /*　以下の２つは amabeowand 用の設定です。githubではコメントアウトしています */
     /* margin-bottom: 0;  */      /* オリジナルは margin-bottom: 2em;*//* 今回は 0 に変更 */
    　/*padding-bottom: 2em;  */  /*  margin-bottom: 0;  の代わりに　paddingで代替 */
    
     /* 以下の３つは github 用の設定です*/
     max-width: 800px;    /* 横幅が広がりすぎないように制限 */
     margin: 40px auto;   /* 上下に余裕を持たせ、左右は中央に寄せる */
     padding: 20px;       /* 画面の端にくっつかないように内側に余白 */
     
    
 }

 /* アイコン */
 .talking figure {
     width: 100px; /* アイコンの横幅 */
     height: 100px; /* アイコンの縦幅 */
     margin: 0; /* デフォルトのマージンをリセット */
     text-align: center; /* キャプションを中央揃え */
 }

 .talking figure img {
     width: 100%;
     height: 100%;
     border: 2px solid #d7ebfe;
     border-radius: 50%;
 }

 /* アイコンの下の名前 */
 .talking figure figcaption {
     padding: 2px 0 0;
     font-size: 12px;
 }

 .talking p {
     margin: 0;
 }

 .talking p:last-child {
     margin: 0;
 }

 /* 吹き出しセリフ部分 */
 .think-left,
 .think-right {
     position: relative;
     padding: 10px; /* 内側の余白 */
     border-style: solid; /* 枠線の線種 */
     border-radius: 30px;
     max-width: calc(100% - 140px); /* 吹き出しの最大幅（アイコンを考慮） */
     overflow-wrap: break-word; /* 長い単語の折り返しを有効に */
     box-sizing: border-box; /* パディングと枠線を含む幅計算 */
     margin-left: 30px; /* アイコンとの間に余白を追加 */
 }

 /* 左の吹き出し */
 .think-left {
     border-width: 2px; /* 枠線の太さ */
     border-color: #d7ebfe; /* 枠線の色 */
     background: #fff; /* 背景色 */
 }

/*左の考えごと 小さい丸*/
.think-left:before {
     position:absolute;
     content: '';
     width:8px;
     height:8px;
     border:2px solid #d7ebfe;  /*枠線の太さ 線種 色*/
     border-radius:50%;
     top:22px;
     left:-27px;
     background:#fff;    /*背景色*/
}

/*左の考えごと 大きい丸*/
.think-left:after {
     position:absolute;
     content: '';
     width:15px;
     height:15px;
     border:2px solid #d7ebfe;  /*枠線の 線種 色*/
     border-radius:50%;
     top:12px;
     left:-18px;
     background:#fff;    /*背景色*/
}



 /* 右の吹き出し */
 .think-right {
     border-width: 2px; /* 枠線の太さ */
     border-color: #d7ebfe; /* 枠線の色 */
     background: #fff; /* 背景色 */
     margin-left: 10px; /* アイコンの左の余白 */
 }



 /* 右の吹き出し 大きい丸 */
 .think-right:before {
     position: absolute;
     content: '';
     width: 15px;
     height: 15px;
     border: 2px solid #d7ebfe; /* 枠線の 線種 色 */
     border-radius: 50%;
     top: 12px;
     right: -25px; /* 右側の位置を調整 */
     background: #fff; /* 背景色 */
 }

 /* 右の吹き出し 小さい丸 */
 .think-right:after {
     position: absolute;
     content: '';
     width: 8px;
     height: 8px;
     border: 2px solid #d7ebfe; /* 枠線の太さ 線種 色 */
     border-radius: 50%;
     top: 22px;
     right: -15px; /* 右側の位置を調整 */
     background: #fff; /* 背景色 */
 }
   /* CSSアニメーションの設定 */
   .poyon {
     animation: poyon 1.1s linear 0s 1;
   }
   @keyframes poyon {
     0%   { transform: scale(0.8, 1.4) translate(0%, -100%); }
     10%  { transform: scale(0.8, 1.4) translate(0%, -15%); }
     20%  { transform: scale(1.4, 0.6) translate(0%, 30%); }
     30%  { transform: scale(0.9, 1.1) translate(0%, -10%); }
     40%  { transform: scale(0.95, 1.2) translate(0%, -30%); }
     50%  { transform: scale(0.95, 1.2) translate(0%, -10%); }
     60%  { transform: scale(1.1, 0.9) translate(0%, 5%); }
     70%  { transform: scale(1.0, 1.0) translate(0%, 0%); }
     100% { transform: scale(1.0, 1.0) translate(0%, 0%); }
   }

</style>
</head>

<body>

<!--左の考えごと風の吹き出し-->
 <div class="talking">
  <figure class="think-left_icon">
     <img id="tortoise-7a-transparent" class="poyon" src="https://cdn.amebaowndme.com/madrid-prd/madrid-web/images/sites/499076/8d7b0a32c24c44e54b0c1eb2c7281063_67566f3dac4e938eb83368c8f6542a68.png">
     <figcaption>Tortoise</figcaption>
  </figure>
  <div class="think-left">
    <p>Bienvenue sur <a href="https://escalade.amebaownd.com/pages/3863613/alsace">Ciel Bleu</a>, Grimpe en Vue ! Je vous propose ici un regard japonais sur les grès des Vosges. Prêt pour quelques aventures au fil des récits ? Bonne lecture !</p>
  </div>
</div> 
<!--左の考えごと風の吹き出し終わり-->



 <script>
  document.addEventListener("DOMContentLoaded", () => {
    // ID値「tortoise-7a-transparent」に対してCSSアニメ―ション「poyon」を300ミリ秒の間隔を空けてループ再生
    loopAnimation("tortoise-7a-transparent", "poyon", 300);

    // CSSアニメーションを間隔を空けてループ再生させる処理
    function loopAnimation(id, className, delay) {
      var element = document.getElementById(id);
      element.addEventListener("animationend", listener);
      
      function listener(event) {
        event.target.classList.remove(className);
        setTimeout(playAnimation, delay);
      }
    
      function playAnimation() {
        element.classList.add(className);
      }
    }
  });
</script>
</body>
</html>
